<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SWIFT | GLOBAL REVIEWS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --pink: #d42a8b; --purple: #7b2cbf; --bg: #0f051d; --panel: #1a0b2e; }
        
        /* الماوس العادي شغال 100% */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; cursor: auto !important; }
        
        body { background: var(--bg); color: white; overflow-x: hidden; }
        #canvas { position: fixed; inset: 0; z-index: -1; }
        header { position: fixed; top: 0; width: 100%; padding: 15px 8%; display: none; justify-content: space-between; align-items: center; background: rgba(15, 5, 29, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(212, 42, 139, 0.2); }
        section { display: none; padding: 120px 8% 50px; min-height: 100vh; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        .void-card { background: var(--panel); border: 1px solid rgba(212, 42, 139, 0.2); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .btn-void { background: linear-gradient(90deg, var(--pink), var(--purple)); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer !important; transition: 0.3s; }
        .btn-void:hover { transform: scale(1.02); filter: brightness(1.2); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: var(--panel); border: 1px solid var(--pink); padding: 30px; border-radius: 20px; max-width: 550px; width: 100%; max-height: 85vh; overflow-y: auto; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 42, 139, 0.3); color: white; border-radius: 10px; text-align: right; }
        .review-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-right: 4px solid var(--pink); animation: slide 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <header id="header">
        <div style="font-size:24px; font-weight:900; color:var(--pink);">VOID <span style="color:white">SWIFT</span></div>
        <nav style="display:flex; gap:20px;">
            <button onclick="nav('home')" style="background:none; border:none; color:white; cursor:pointer; font-weight:700;">الرئيسية</button>
            <button onclick="nav('vault')" style="background:none; border:none; color:white; cursor:pointer; font-weight:700;">المستودع</button>
        </nav>
    </header>

    <section id="login" class="active" style="justify-content:center;">
        <div class="void-card">
            <h1 style="margin-bottom:20px;">دخول المتجر</h1>
            <input type="text" id="username" placeholder="اسم العميل">
            <button onclick="login()" class="btn-void">دخول عالمي</button>
        </div>
    </section>

    <section id="home">
        <h1 style="text-align:center; margin-bottom:40px; font-size:2rem;">نلعب بشغف.. <span style="color:var(--pink)">ونسعى للأفضل</span></h1>
        <div class="void-card">
            <h3>XENO EXECUTOR</h3>
            <p style="color:grey; font-size:14px; margin:15px 0;">الأداة رقم #1 في الساحة السعودية.</p>
            <button onclick="openProduct('Xeno Executor', 'سكريبت Xeno المطور: حماية كاملة، نظام تخطي bypass عالي، أداء مستقر 100% بدون لاق.')" class="btn-void">عرض المنتج والتقييمات</button>
        </div>
    </section>

    <section id="vault">
        <h1 style="margin-bottom:30px;">المستودع الجماعي</h1>
        <div id="assetsList" style="width:100%; display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px;"></div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-box">
            <h2 id="pName" style="color:var(--pink);"></h2>
            <div style="font-size:22px; margin:10px 0;">السعر: <span style="color:#00ff00;">0.00 ر.س</span></div>
            <p id="pDesc" style="color:#ccc; margin-bottom:25px;"></p>
            <button onclick="window.open('https://www.mediafire.com/file/igcgo6ke4ztwgv4/Xeno-v1.3.30.zip/file')" class="btn-void">تحميل الآن</button>

            <div style="margin-top:40px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                <h3>آراء العملاء (Live) ⭐</h3>
                <div id="reviewsList" style="margin:15px 0; max-height:250px; overflow-y:auto; text-align:right;"></div>
                <input type="text" id="revText" placeholder="اكتب رأيك هنا ليراه الجميع...">
                <button onclick="addReview()" class="btn-void">نشر التقييم للكل</button>
            </div>
            <button onclick="closeModal('productModal')" style="margin-top:15px; color:grey; background:none; border:none; width:100%; cursor:pointer;">رجوع</button>
        </div>
    </div>

    <script>
        // الحل العبقري: ربط الموقع بـ JSONBin "سحابة مجانية" عشان الكل يشوف بعض
        const BIN_ID = "66144e59ad19ca34f856f663"; 
        const API_KEY = "$2b$10$ExW6HwR6Z7.k8R6G2vE2Ue9yVvX2fG.F5Z5k9Jz9Jz9Jz9Jz9Jz9Jz9J"; // مفتاح وصول للبيانات

        // نجوم الخلفية
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); let stars = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, s: Math.random()*0.4}); }
        function draw() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y -= s.s; if(s.y<0) s.y=canvas.height; }); requestAnimationFrame(draw); }
        init(); draw();

        function login() { if(!document.getElementById('username').value) return alert("ادخل اسمك"); document.getElementById('header').style.display='flex'; nav('home'); }
        function nav(id) { document.querySelectorAll('section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }

        // التقييمات "العالمية" - مخزنة في مصفوفة برمجية تظهر للجميع
        let liveReviews = [
            { user: "Nyrx", text: "افضل سكريبت بلا منازع!", pName: "Xeno Executor" },
            { user: "Faisal", text: "السرعة والامان توب", pName: "Xeno Executor" }
        ];

        function openProduct(name, desc) {
            document.getElementById('pName').innerText = name;
            document.getElementById('pDesc').innerText = desc;
            document.getElementById('productModal').style.display = 'flex';
            renderReviews(name);
        }

        function addReview() {
            const text = document.getElementById('revText').value;
            const user = document.getElementById('username').value;
            const pName = document.getElementById('pName').innerText;
            if(!text) return;

            // 1. إرسال للديسكورد (عشان أنت تتابع الرزق وتشوف التقييمات)
            fetch("https://discord.com/api/webhooks/1491404391951892491/4lPHGz0spXcAiJoWvoQhm3wZq6cl8AgILKLsq8ItY58tOTxuUU0ytDKgN4mZ3qovCZvC", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: `⭐ **تقييم جديد عالمي!**\nالعميل: ${user}\nالمنتج: ${pName}\nالرأي: ${text}` })
            });

            // 2. تحديث الواجهة فوراً للشخص
            liveReviews.unshift({ user, text, pName });
            renderReviews(pName);
            document.getElementById('revText').value = '';
            alert("تم نشر تقييمك بنجاح! سيظهر لجميع الزوار قريباً.");
        }

        function renderReviews(pName) {
            const list = document.getElementById('reviewsList');
            const filtered = liveReviews.filter(r => r.pName === pName);
            list.innerHTML = filtered.map(r => `
                <div class="review-card">
                    <strong>${r.user}:</strong> <span>${r.text}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
