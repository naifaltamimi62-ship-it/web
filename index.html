<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFT NEXUS | FIXED VERSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;500;700&display=swap');
        :root { --primary: #00f2ff; --secondary: #7000ff; --bg: #010409; --card-bg: rgba(13, 17, 23, 0.95); --neon: 0 0 20px rgba(0, 242, 255, 0.5); }
        #star-canvas { position: fixed; inset: 0; z-index: -1; background: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; }
        body { background: var(--bg); color: white; overflow-x: hidden; }
        #cursor { position: fixed; width: 25px; height: 25px; border: 2px solid var(--primary); border-radius: 50%; pointer-events: none; z-index: 99999; transition: transform 0.1s; }
        #cursor-dot { position: fixed; width: 5px; height: 5px; background: white; border-radius: 50%; pointer-events: none; z-index: 99999; }
        #transition-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; justify-content: center; align-items: center; }
        .trans-text { font-family: 'Orbitron'; font-size: 4rem; color: var(--primary); text-shadow: var(--neon); letter-spacing: 15px; animation: pulse 0.5s infinite; }
        header { padding: 20px 8%; display: none; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 5000; background: rgba(1,4,9,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,242,255,0.2); }
        section { display: none; padding: 120px 8% 50px; flex-direction: column; min-height: 100vh; }
        .active { display: flex; animation: sectionFade 0.6s ease forwards; }
        @keyframes sectionFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .asset-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 35px; border-radius: 20px; transition: 0.4s; position: relative; }
        .asset-card:hover { border-color: var(--primary); box-shadow: var(--neon); transform: translateY(-10px); }
        .asset-card h3 { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 15px; }
        .btn-elite { padding: 12px 25px; background: none; border: 1px solid var(--primary); color: var(--primary); font-family: 'Orbitron'; font-weight: 700; transition: 0.3s; text-decoration: none; text-align: center; display: inline-block; width: 100%; }
        .btn-elite:hover { background: var(--primary); color: #000; box-shadow: var(--neon); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--primary); padding: 40px; border-radius: 25px; width: 90%; max-width: 500px; }
        .input-group { background: rgba(0,0,0,0.6); border: 1px solid #1e293b; padding: 15px; color: white; border-radius: 10px; margin-bottom: 15px; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="cursor"></div><div id="cursor-dot"></div>
    <canvas id="star-canvas"></canvas>
    <div id="transition-overlay"><div class="trans-text">SWIFT</div></div>

    <header id="main-header">
        <a href="#" onclick="swiftNav('home')" class="logo" style="font-family:'Orbitron'; color:var(--primary); text-decoration:none; font-size:24px; font-weight:900;">SWIFT <span style="color:white">NEXUS</span></a>
        <nav style="display:flex; gap:25px;">
            <a href="#" onclick="swiftNav('home')" style="color:white; text-decoration:none; font-size:12px; font-weight:700;">HOME</a>
            <a href="#" onclick="swiftNav('vault')" style="color:white; text-decoration:none; font-size:12px; font-weight:700;">COMMUNITY VAULT</a>
        </nav>
    </header>

    <section id="login" class="active" style="align-items:center; justify-content:center;">
        <div style="background:var(--card-bg); border:1px solid var(--primary); padding:50px; border-radius:20px; text-align:center; max-width:420px; width:100%;">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:30px;">AUTHORIZATION</h2>
            <input type="text" id="user" placeholder="AGENT NAME" class="input-group">
            <input type="password" id="pass" placeholder="ACCESS KEY" class="input-group">
            <button onclick="validate()" class="btn-elite">LOGIN</button>
        </div>
    </section>

    <section id="home">
        <h1 style="font-family:'Orbitron'; font-size:3rem; margin-bottom:40px;">DASHBOARD</h1>
        <div class="grid">
            <div class="asset-card">
                <h3>XENO EXECUTOR</h3>
                <p style="color:#94a3b8; margin-bottom:20px;">The official memory engine. Click below to open download page.</p>
                <a href="https://www.mediafire.com/file/igcgo6ke4ztwgv4/Xeno-v1.3.30.zip/file" target="_blank" class="btn-elite">OPEN MEDIAFIRE</a>
            </div>
            <div class="asset-card">
                <h3>UPLOAD STATUS</h3>
                <p style="color:#94a3b8;">Webhook Status: <span style="color:#00ff00;">ONLINE</span></p>
                <button onclick="openShareModal()" class="btn-elite" style="margin-top:20px;">SHARE NEW SCRIPT</button>
            </div>
        </div>
    </section>

    <section id="vault">
        <h1 style="font-family:'Orbitron'; font-size:3rem; text-align:center; margin-bottom:50px;">COMMUNITY <span style="color:var(--primary)">VAULT</span></h1>
        <div class="grid" id="communityGrid"></div>
    </section>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:25px;">SHARE SCRIPT</h2>
            <input type="text" id="hTitle" placeholder="Script Name" class="input-group">
            <input type="text" id="hLink" placeholder="Link" class="input-group">
            <button onclick="broadcastAsset()" class="btn-elite">UPLOAD</button>
            <button onclick="closeShareModal()" class="btn-elite" style="margin-top:10px; border-color:#ff4d4d; color:#ff4d4d;">CANCEL</button>
        </div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1491404391951892491/4lPHGz0spXcAiJoWvoQhm3wZq6cl8AgILKLsq8ItY58tOTxuUU0ytDKgN4mZ3qovCZvC";
        
        // هاكات المجتمع - هنا يمكنك إضافة أي هاك جديد ليراه الجميع
        const globalAssets = [
            { title: "XENO V3.0", agent: "VIPER", link: "https://www.mediafire.com/file/igcgo6ke4ztwgv4/Xeno-v1.3.30.zip/file" },
            { title: "GHOST MODULE", agent: "GHOST", link: "#" },
            { title: "AIM ASSIST", agent: "AGENT_X", link: "#" }
        ];

        const canvas = document.getElementById('star-canvas'); const ctx = canvas.getContext('2d'); let stars = [];
        function initStars() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5 }); }
        function drawStars() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y -= s.speed; if(s.y < 0) s.y = canvas.height; }); requestAnimationFrame(drawStars); }
        initStars(); drawStars();
        const cursor = document.getElementById('cursor'); const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; dot.style.left = e.clientX+'px'; dot.style.top = e.clientY+'px'; });

        function swiftNav(target) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
                document.getElementById(target).classList.add('active');
                overlay.style.display = 'none';
                if(target === 'vault') loadVault();
            }, 800);
        }

        function validate() {
            document.getElementById('main-header').style.display = 'flex';
            swiftNav('home');
        }

        function openShareModal() { document.getElementById('shareModal').style.display = 'flex'; }
        function closeShareModal() { document.getElementById('shareModal').style.display = 'none'; }

        async function broadcastAsset() {
            const title = document.getElementById('hTitle').value;
            const link = document.getElementById('hLink').value;
            if(!title || !link) return alert("Fill data!");
            await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: `🚀 New Script: **${title}**\nLink: ${link}` }) });
            alert("Broadcasted! Add it to the code to show everyone.");
            closeShareModal();
        }

        function loadVault() {
            const grid = document.getElementById('communityGrid');
            grid.innerHTML = globalAssets.map(a => `<div class="asset-card"><h3>${a.title}</h3><p style="color:#94a3b8; font-size:12px;">Agent: ${a.agent}</p><a href="${a.link}" target="_blank" class="btn-elite" style="margin-top:15px;">GET SCRIPT</a></div>`).join('');
        }
    </script>
</body>
</html>
