<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SWIFT | SAUDI EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root {
            --pink: #d42a8b;
            --purple: #7b2cbf;
            --bg: #0f051d;
            --panel: #1a0b2e;
        }

        /* حل مشكلة الماوس النهائي: إجبار الماوس العادي */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
            cursor: auto !important; 
        }

        body { background: var(--bg); color: white; overflow-x: hidden; }
        #canvas { position: fixed; inset: 0; z-index: -1; }
        
        header { 
            position: fixed; top: 0; width: 100%; padding: 15px 8%; 
            display: none; justify-content: space-between; align-items: center; 
            background: rgba(15, 5, 29, 0.9); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid rgba(212, 42, 139, 0.2); 
        }

        section { display: none; padding: 120px 8% 50px; min-height: 100vh; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }

        .void-card { 
            background: var(--panel); border: 1px solid rgba(212, 42, 139, 0.2); 
            padding: 30px; border-radius: 20px; text-align: center; 
            width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
        }

        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 42, 139, 0.3); 
            color: white; border-radius: 10px; text-align: right; 
        }

        .btn-void { 
            background: linear-gradient(90deg, var(--pink), var(--purple)); 
            color: white; border: none; padding: 12px 25px; border-radius: 12px; 
            font-weight: 900; width: 100%; cursor: pointer !important; 
        }

        /* المودال الخاص بالتقييمات */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 10000; display: none; justify-content: center; align-items: center; 
        }
        .modal-box { 
            background: var(--panel); border: 2px solid var(--pink); 
            padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; 
        }

        .review-item { 
            background: rgba(255,255,255,0.03); padding: 10px; 
            border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--pink); 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <header id="header">
        <div style="font-size: 24px; font-weight: 900; color: var(--pink);">VOID <span style="color:white">SWIFT</span></div>
    </header>

    <section id="login" class="active">
        <div class="void-card">
            <h1 style="margin-bottom: 20px;">نظام سويفت المتكامل</h1>
            <input type="text" id="username" placeholder="ادخل اسمك المستعار">
            <button onclick="startApp()" class="btn-void">دخول عالمي</button>
        </div>
    </section>

    <section id="home">
        <div class="void-card">
            <h2 style="color: var(--pink);">XENO EXECUTOR</h2>
            <p style="margin: 15px 0; color: #ccc;">أفضل أداة حماية وتشفير متوفرة حالياً.</p>
            <button onclick="openProduct('Xeno Executor')" class="btn-void">عرض التقييمات اللايف</button>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-box">
            <h2 id="pName" style="color: var(--pink); margin-bottom: 15px;"></h2>
            <div id="reviewsList" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px; text-align: right;">
                جاري جلب البيانات من السحابة...
            </div>
            <input type="text" id="revText" placeholder="اكتب رأيك هنا..">
            <button onclick="pushReview()" class="btn-void">نشر التقييم</button>
            <button onclick="closeModal()" style="margin-top: 10px; color: grey; background: none; border: none; width: 100%;">إغلاق</button>
        </div>
    </div>

    <script>
        // --- إعدادات FIREBASE من صورتك ---
        const firebaseConfig = {
            apiKey: "AIzaSyCwVnf3CXX2d8W18NPATsqkLhmBabCgaB4",
            authDomain: "swiftvoid-3e5a6.firebaseapp.com",
            projectId: "swiftvoid-3e5a6",
            storageBucket: "swiftvoid-3e5a6.firebasestorage.app",
            messagingSenderId: "375536130124",
            appId: "1:375536130124:web:a4ff59516a8b66da2fce9",
            measurementId: "G-H78SQC4CHX"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function startApp() {
            if(!document.getElementById('username').value) return alert("سجل اسمك يا بطل");
            document.getElementById('header').style.display = 'flex';
            document.getElementById('login').classList.remove('active');
            document.getElementById('home').classList.add('active');
        }

        function openProduct(name) {
            document.getElementById('pName').innerText = name;
            document.getElementById('productModal').style.display = 'flex';
            
            // جلب مباشر من قاعدة البيانات
            database.ref('reviews/' + name).on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('reviewsList');
                list.innerHTML = "";
                if(data) {
                    Object.values(data).reverse().forEach(r => {
                        list.innerHTML += `<div class="review-item"><strong>${r.user}:</strong> ${r.text}</div>`;
                    });
                } else { list.innerHTML = "لا يوجد تقييمات.. كن الأول!"; }
            });
        }

        function pushReview() {
            const text = document.getElementById('revText').value;
            const user = document.getElementById('username').value;
            const pName = document.getElementById('pName').innerText;
            if(!text) return;

            database.ref('reviews/' + pName).push({ user, text });
            document.getElementById('revText').value = "";
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        // خلفية النجوم
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.5, s:Math.random()*0.5});
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y-=s.s; if(s.y<0) s.y=canvas.height; });
            requestAnimationFrame(animate);
        }
        initStars(); animate();
    </script>
</body>
</html>
