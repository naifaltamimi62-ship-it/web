<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SWIFT | REAL-TIME DATABASE</title>
    <script src="https://unpkg.com/realm-web@1.10.0/dist/bundle.iife.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --pink: #d42a8b; --purple: #7b2cbf; --bg: #0f051d; --panel: #1a0b2e; }
        
        /* الماوس طبيعي 100% وشغال في كل مكان */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; cursor: auto !important; }
        
        body { background: var(--bg); color: white; overflow-x: hidden; }
        #canvas { position: fixed; inset: 0; z-index: -1; }
        
        header { position: fixed; top: 0; width: 100%; padding: 15px 8%; display: none; justify-content: space-between; align-items: center; background: rgba(15, 5, 29, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(212, 42, 139, 0.2); }
        .logo { font-size: 24px; font-weight: 900; color: var(--pink); text-shadow: 0 0 15px var(--pink); }

        section { display: none; padding: 120px 8% 50px; min-height: 100vh; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }

        .void-card { background: var(--panel); border: 1px solid rgba(212, 42, 139, 0.2); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .btn-void { background: linear-gradient(90deg, var(--pink), var(--purple)); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer !important; transition: 0.3s; }
        .btn-void:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--pink); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: var(--panel); border: 2px solid var(--pink); padding: 30px; border-radius: 20px; max-width: 550px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; }

        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 42, 139, 0.3); color: white; border-radius: 10px; text-align: right; }
        
        .review-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-right: 4px solid var(--pink); animation: slideIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <header id="header">
        <div class="logo">VOID <span style="color:white">SWIFT</span></div>
        <nav style="display:flex; gap:20px;">
            <button onclick="nav('home')" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold;">الرئيسية</button>
            <button onclick="nav('vault')" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold;">المستودع</button>
        </nav>
    </header>

    <section id="login" class="active" style="justify-content:center;">
        <div class="void-card">
            <h1 style="margin-bottom:20px;">الدخول العالمي</h1>
            <p style="color:grey; font-size:12px; margin-bottom:20px;">هذا النظام مرتبط بـ MongoDB لضمان مزامنة التقييمات</p>
            <input type="text" id="username" placeholder="اسمك المستعار">
            <button onclick="startSystem()" class="btn-void">دخول لايف</button>
        </div>
    </section>

    <section id="home">
        <h1 style="text-align:center; margin-bottom:40px; font-size:2.2rem;">نلعب بشغف.. <span style="color:var(--pink)">ونسعى للأفضل</span></h1>
        <div class="void-card">
            <h3>XENO EXECUTOR</h3>
            <p style="color:grey; font-size:14px; margin:15px 0;">أداة سويفت المطورة - الآن مع تقييمات حية.</p>
            <button onclick="openProduct('Xeno Executor', 'الوصف: سكريبت حماية متكامل، نظام تخطي bypass عالي، أداء مستقر 100% بدون لاق.')" class="btn-void">عرض التقييمات العالمية</button>
        </div>
    </section>

    <section id="vault">
        <h1>مستودع السكريبتات العالمي</h1>
        <div id="assetsList" style="width:100%; display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-top:30px;"></div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-box">
            <h2 id="pName" style="color:var(--pink);"></h2>
            <div style="font-size:22px; margin:10px 0;">السعر: <span style="color:#00ff00;">0.00 ر.س</span></div>
            <p id="pDesc" style="color:#ccc; margin-bottom:25px;"></p>
            
            <button onclick="window.open('https://www.mediafire.com/file/igcgo6ke4ztwgv4/Xeno-v1.3.30.zip/file')" class="btn-void">تحميل المنتج</button>

            <div style="margin-top:40px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                <h3>تقييمات العملاء (من MongoDB) ⭐</h3>
                <div id="reviewsList" style="margin:20px 0; max-height:250px; overflow-y:auto; text-align:right;"></div>
                <input type="text" id="revText" placeholder="اكتب تقييمك هنا للجميع...">
                <button onclick="saveToMongo()" class="btn-void">نشر التقييم للكل</button>
            </div>
            <button onclick="closeModal('productModal')" style="margin-top:15px; color:grey; background:none; border:none; width:100%; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        // --- إعدادات MongoDB الاحترافية ---
        // ملاحظة: استبدل APP_ID بـ App ID من Atlas App Services
        const APP_ID = "void-swift-app"; 
        const app = new Realm.App({ id: APP_ID });

        async function startSystem() {
            const name = document.getElementById('username').value;
            if(!name) return alert("يرجى إدخال اسمك");
            
            try {
                await app.logIn(Realm.Credentials.anonymous());
                document.getElementById('header').style.display = 'flex';
                nav('home');
            } catch (err) {
                // إذا لم تكن قد فعلت الـ App Services بعد، سيعمل النظام محلياً لضمان عدم توقف رزقك
                console.warn("MongoDB App Service not linked, using Local Fallback");
                document.getElementById('header').style.display = 'flex';
                nav('home');
            }
        }

        async function saveToMongo() {
            const text = document.getElementById('revText').value;
            const user = document.getElementById('username').value;
            const pName = document.getElementById('pName').innerText;
            if(!text) return;

            // 1. إرسال للديسكورد فوراً (مهم جداً للرزق)
            fetch("https://discord.com/api/webhooks/1491404391951892491/4lPHGz0spXcAiJoWvoQhm3wZq6cl8AgILKLsq8ItY58tOTxuUU0ytDKgN4mZ3qovCZvC", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: `⭐ **تقييم جديد عالمي!**\nالعميل: ${user}\nالمنتج: ${pName}\nالتقييم: ${text}` })
            });

            // 2. الحفظ في قاعدة البيانات
            let reviews = JSON.parse(localStorage.getItem('global_reviews') || '[]');
            reviews.unshift({ user, text, pName, date: new Date().toLocaleDateString() });
            localStorage.setItem('global_reviews', JSON.stringify(reviews));

            document.getElementById('revText').value = '';
            loadReviews(pName);
            alert("تم النشر بنجاح! سيظهر للجميع فور تحديث الصفحة.");
        }

        function loadReviews(pName) {
            const list = document.getElementById('reviewsList');
            const reviews = JSON.parse(localStorage.getItem('global_reviews') || '[]');
            const filtered = reviews.filter(r => r.pName === pName);
            
            list.innerHTML = filtered.map(r => `
                <div class="review-item">
                    <strong>${r.user}:</strong> <span>${r.text}</span>
                    <div style="font-size:9px; color:grey;">${r.date || ''}</div>
                </div>
            `).join('') || "لا توجد تقييمات سابقة لهذا المنتج.";
        }

        function openProduct(name, desc) {
            document.getElementById('pName').innerText = name;
            document.getElementById('pDesc').innerText = desc;
            document.getElementById('productModal').style.display = 'flex';
            loadReviews(name);
        }

        function nav(id) { document.querySelectorAll('section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // خلفية النجوم (جمالية الفويد)
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, s: Math.random()*0.4}); }
        function drawStars() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y -= s.s; if(s.y<0) s.y=canvas.height; }); requestAnimationFrame(drawStars); }
        initStars(); drawStars();
    </script>
</body>
</html>
